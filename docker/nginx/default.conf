server {
    listen 80;
    server_name _;

    # Firmware-Upload (POST /api/v1/provisioning/artifacts) erlaubt bis 8 MB
    # (App-Limit FIRMWARE_UPLOAD_MAX_BYTES). nginx-Default ist 1 MB -> 413.
    # 16m gibt multipart-Overhead Luft; das App-Limit setzt die harte Grenze.
    client_max_body_size 16m;

    # ── ESP32-OTA: Firmware-Binaries statisch servieren (kein PHP/FastCGI) ─────
    # Ablage: backend/var/firmware-serve/{board}/{channel}/{version}.bin
    # PHP-Manifest-Endpunkt bleibt aktiv (kein .bin-Suffix → fällt durch auf /api-Block).
    location ~ ^/api/v1/readers/firmware/(?P<board>[^/]+)/(?P<channel>[^/]+)/(?P<ver>[^/]+\.bin)$ {
        alias /var/firmware-serve/$board/$channel/$ver;
        add_header X-Firmware-Sha256 "" always;
        default_type application/octet-stream;
    }

    # ── Backend API (Symfony front controller) ───────────────────────────────
    location /api {
        root /var/www/html/public;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        root /var/www/html/public;
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Audio-Extractor läuft synchron (yt-dlp/ffmpeg, Plan D-A/R3): Default-60s reichen nicht.
        # Muss über dem PHP-Process-Timeout (AUDIO_EXTRACTOR_TIMEOUT_SECONDS, Default 240) liegen.
        fastcgi_read_timeout 300s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # ── Frontend SPA (static build, client-side routing fallback) ─────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
