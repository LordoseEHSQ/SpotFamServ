      operationId: get_api_rfid_lookup
      responses:
        default:
          description: ''
  /api/v1/readers/claims:
    post:
      operationId: post_api_reader_claims_create
      responses:
        default:
          description: ''
  '/api/v1/readers/claims/{claimCode}':
    get:
      operationId: get_api_reader_claims_status
      parameters:
        -
          name: claimCode
          in: path
          required: true
          schema:
            type: string
            pattern: '[A-Za-z0-9\- ]+'
      responses:
        default:
          description: ''
  '/api/v1/readers/claims/{claimCode}/activate':
    post:
      operationId: post_api_reader_claims_activate
      parameters:
        -
          name: claimCode
          in: path
          required: true
          schema:
            type: string
            pattern: '[A-Za-z0-9\- ]+'
      responses:
