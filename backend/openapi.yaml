openapi: 3.0.0
info:
  title: 'SpotFamServ API'
  description: 'Spotify Familien Server – Backend API (Vertrag, geprüft via oasdiff)'
  version: 1.0.0
servers:
  -
    url: /api/v1
    description: 'API v1'
paths:
  /api/v1/provisioning/jobs/next:
    get:
      summary: "GET /api/v1/provisioning/jobs/next?deviceId={id}\nLiefert den ältesten pending-Job oder 204 wenn keiner vorhanden."
      operationId: get_api_provisioning_agent_get_next_job
      responses:
        default:
          description: ''
  /api/v1/activity-log:
    get:
      operationId: get_api_activity_log_list
      responses:
        default:
          description: ''
  /api/v1/auth/csrf:
    get:
      tags:
        - Auth
      summary: 'Setzt das CSRF-Double-Submit-Cookie (XSRF-TOKEN)'
      description: "Setzt ein NICHT-HttpOnly Double-Submit-CSRF-Cookie (XSRF-TOKEN) und antwortet 204.\nDas Frontend liest dieses Cookie und spiegelt es bei mutierenden Requests als\nHeader X-XSRF-TOKEN. Public (vor Login erreichbar)."
      operationId: get_api_auth_csrf
      responses:
        '204':
          description: 'CSRF-Cookie gesetzt'
  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: 'Gibt den eingeloggten Admin zurück'
      description: "Liefert Username und Rollen des eingeloggten Admins.\nCatch-all-Regel → 401, wenn keine gültige Session vorhanden."
      operationId: get_api_auth_me
      responses:
        '200':
          description: 'Eingeloggter Admin'
          content:
            application/json:
              schema:
                properties:
                  username: { type: string }
                  roles: { type: array, items: { type: string } }
                type: object
        '401':
          description: 'Nicht eingeloggt'
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: 'Login (json_login; wird von der Firewall abgefangen)'
      description: "Route muss existieren, damit der Router kein 404 wirft.\nDie Firewall (json_login) fängt diese Route ab – dieser Body wird nie erreicht."
      operationId: post_api_auth_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
              type: object
      responses:
        '204':
          description: 'Login erfolgreich (Set-Cookie)'
        '401':
          description: 'Ungültige Credentials'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: 'Logout (Session invalidieren)'
      description: "Route muss existieren; der Firewall-Logout-Listener fängt sie ab.\nResponse wird durch AuthLogoutSubscriber auf 204 gesetzt."
      operationId: post_api_auth_logout
      responses:
        '204':
          description: 'Logout erfolgreich'
  /api/v1/audio-extractor/config:
    get:
      operationId: get_api_audio_extractor_config
      responses:
        default:
          description: ''
  /api/v1/audio-extractor/extract:
    post:
      summary: "Enqueue an extraction. The work runs in the background worker, so this returns\nimmediately with 202 + job_id (changed from the old synchronous 201, D-032). The\nclient polls GET /jobs/{id} for progress and the result file."
      operationId: post_api_audio_extractor_extract
      responses:
        default:
          description: ''
  /api/v1/audio-extractor/jobs:
    get:
      operationId: get_api_audio_extractor_jobs_list
      responses:
        default:
          description: ''
  '/api/v1/audio-extractor/jobs/{id}':
    get:
      operationId: get_api_audio_extractor_jobs_get
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_audio_extractor_jobs_cancel
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 'Job canceled (was pending). Returns the updated job.'
        '204':
          description: 'Job dismissed (was failed or canceled). No content.'
        '404':
          description: 'Job not found.'
        '409':
          description: 'Job is running or done and cannot be canceled/dismissed.'
  /api/v1/audio-extractor/files:
    get:
      operationId: get_api_audio_extractor_files_list
      responses:
        default:
          description: ''
  '/api/v1/audio-extractor/files/{name}':
    get:
      operationId: get_api_audio_extractor_files_download
      parameters:
        -
          name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_audio_extractor_files_delete
      parameters:
        -
          name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
  /api/v1/audio-extractor/update:
    post:
      operationId: post_api_audio_extractor_update
      responses:
        default:
          description: ''
  /api/v1/devices:
    get:
      operationId: get_api_devices_list
      responses:
        default:
          description: ''
  '/api/v1/devices/{id}':
    get:
      operationId: get_api_devices_get
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  '/api/v1/devices/{id}/assign':
    put:
      operationId: put_api_devices_assign
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  /api/v1/devices/discover:
    post:
      operationId: post_api_devices_discover
      responses:
        default:
          description: ''
  /api/v1/devices/discovery-runs/latest:
    get:
      operationId: get_api_devices_discovery_latest
      responses:
        default:
          description: ''
  /api/v1/devices/discovery-runs:
    get:
      operationId: get_api_devices_discovery_runs
      responses:
        default:
          description: ''
  /api/v1/profiles:
    get:
      operationId: get_api_profiles_list
      responses:
        default:
          description: ''
    post:
      operationId: post_api_profiles_create
      responses:
        default:
          description: ''
  '/api/v1/profiles/{id}':
    get:
      operationId: get_api_profiles_get
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_profiles_update
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_profiles_delete
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{id}/default-device':
    put:
      operationId: put_api_profiles_set_default_device
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_profiles_clear_default_device
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  /api/v1/health:
    get:
      summary: 'Liveness/Readiness (DB-Ping); public.'
      operationId: get_api_health
      responses:
        '200':
          description: 'OK – App + DB erreichbar'
        '503':
          description: 'DB nicht erreichbar'
  /api/v1/provisioning/devices:
    get:
      summary: "GET /api/v1/provisioning/devices\nListe aller erkannten Geräte inkl. letztem Job."
      operationId: get_api_provisioning_admin_list_devices
      responses:
        default:
          description: ''
  /api/v1/provisioning/artifacts:
    get:
      summary: "GET /api/v1/provisioning/artifacts\nListe aller registrierten Firmware-Artefakte."
      operationId: get_api_provisioning_admin_list_artifacts
      responses:
        default:
          description: ''
    post:
      tags:
        - Provisioning
      summary: 'Firmware-Artefakt hochladen und registrieren'
      description: "Authentifizierter Firmware-Upload (multipart/form-data).\nFelder: file (binary), board, channel, version, expectedChip.\nGeschützt durch ROLE_ADMIN-Catch-all (D-027)."
      operationId: post_api_provisioning_admin_upload_artifact
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  type: string
                  format: binary
                board:
                  type: string
                  example: esp32-wroom-32
                channel:
                  type: string
                  example: stable
                version:
                  type: string
                  example: 1.2.3
                expectedChip:
                  type: string
                  example: ESP32-D0WD-V3
              type: object
      responses:
        '201':
          description: 'Artefakt registriert'
        '400':
          description: Validierungsfehler
        '401':
          description: 'Nicht eingeloggt'
  /api/v1/provisioning/jobs:
    post:
      summary: "POST /api/v1/provisioning/jobs\nLegt einen neuen Flash-Job an. 404 wenn Gerät/Artefakt fehlt, 409 bei aktivem Job."
      operationId: post_api_provisioning_admin_create_job
      responses:
        default:
          description: ''
  '/api/v1/provisioning/jobs/{jobId}':
    get:
      summary: "GET /api/v1/provisioning/jobs/{jobId}\nGibt den aktuellen Status eines Jobs zurück."
      operationId: get_api_provisioning_admin_get_job
      parameters:
        -
          name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  /api/v1/provisioning/reader-config:
    get:
      summary: "GET /api/v1/provisioning/reader-config\nLiefert die Reader-Konfiguration für die Flash-Zeit-NVS-Injektion (Sprint 06 / C1):\nWLAN, Backend-URL, OTA-Kanal und der READER_API_KEY (env-kanonisch, D-030)."
      description: "Achtung: enthält Klartext-Secrets (WLAN-Passwort, Reader-Key) – nur über den\nagent-authentifizierten Kanal (X-API-Key) auszuliefern, nie öffentlich."
      operationId: get_api_provisioning_agent_reader_config
      responses:
        default:
          description: ''
  /api/v1/provisioning/devices/detect:
    post:
      summary: "POST /api/v1/provisioning/devices/detect\nUpsert eines erkannten ESP32-Geräts; ActivityLog nur bei Neuanlage."
      operationId: post_api_provisioning_agent_detect_device
      responses:
        default:
          description: ''
  '/api/v1/provisioning/jobs/{jobId}/status':
    post:
      summary: "POST /api/v1/provisioning/jobs/{jobId}/status\nMeldet Statusänderung eines Jobs (running|success|failed)."
      operationId: post_api_provisioning_agent_update_job_status
      parameters:
        -
          name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards':
    get:
      operationId: get_api_rfid_list
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        '200':
          description: 'List of RFID cards for the profile'
          content:
            application/json:
              schema:
                properties:
                  items: { type: array, items: { required: [id, card_uid, label, binding], properties: { id: { type: string, format: uuid }, card_uid: { type: string }, label: { type: string, nullable: true }, binding: { nullable: true, oneOf: [{ required: [id, name], properties: { id: { type: string, format: uuid }, name: { type: string } }, type: object }] } }, type: object } }
                type: object
    post:
      operationId: post_api_rfid_create
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards/{cardId}':
    get:
      operationId: get_api_rfid_get
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_rfid_update
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_rfid_delete
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards/{cardId}/binding':
    get:
      operationId: get_api_rfid_get_binding
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_rfid_set_binding
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  /api/v1/rfid-cards/lookup:
    get:
      operationId: get_api_rfid_lookup
      responses:
        default:
          description: ''
  /api/v1/readers/claims:
    post:
      operationId: post_api_reader_claims_create
      responses:
        default:
          description: ''
  '/api/v1/readers/claims/{claimCode}':
    get:
      operationId: get_api_reader_claims_status
      parameters:
        -
          name: claimCode
          in: path
          required: true
          schema:
            type: string
            pattern: '[A-Za-z0-9\- ]+'
      responses:
        default:
          description: ''
  '/api/v1/readers/claims/{claimCode}/activate':
    post:
      operationId: post_api_reader_claims_activate
      parameters:
        -
          name: claimCode
          in: path
          required: true
          schema:
            type: string
            pattern: '[A-Za-z0-9\- ]+'
      responses:
        default:
          description: ''
  /api/v1/readers:
    get:
      operationId: get_api_readers_list
      responses:
        default:
          description: ''
  '/api/v1/readers/{readerId}/default-device':
    put:
      operationId: put_api_readers_set_default_device
      parameters:
        -
          name: readerId
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_readers_clear_default_device
      parameters:
        -
          name: readerId
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
  '/api/v1/readers/{readerId}/api-key':
    post:
      summary: "Generates (or rotates) a dedicated API key for this reader. The plain key is\nreturned exactly once and never stored or logged; only its hash is persisted."
      operationId: post_api_readers_generate_api_key
      parameters:
        -
          name: readerId
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
    delete:
      summary: "Removes the reader's dedicated API key, re-activating the global-key fallback."
      operationId: delete_api_readers_revoke_api_key
      parameters:
        -
          name: readerId
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        default:
          description: ''
  '/api/v1/readers/{readerId}':
    delete:
      operationId: delete_api_readers_delete
      parameters:
        -
          name: readerId
          in: path
          required: true
          schema:
            type: string
            pattern: '[^/]+'
      responses:
        '204':
          description: 'Reader deleted successfully.'
        '404':
          description: 'Reader not found.'
  /api/v1/readers/firmware/manifest:
    get:
      operationId: get_api_reader_firmware_manifest
      parameters:
        -
          name: board
          in: query
          required: true
          schema:
            type: string
            example: esp32-wroom-32
        -
          name: channel
          in: query
          required: false
          schema:
            type: string
            example: stable
        -
          name: current_version
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d+\.\d+\.\d+$'
      responses:
        '200':
          description: Firmware update available.
        '204':
          description: No update available.
        '400':
          description: Invalid request.
        '422':
          description: Unsupported board or channel.
  '/api/v1/readers/firmware/{board}/{channel}/{version}.bin':
    get:
      operationId: get_api_reader_firmware_download
      parameters:
        -
          name: board
          in: path
          required: true
          schema:
            type: string
        -
          name: channel
          in: path
          required: true
          schema:
            type: string
        -
          name: version
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d+\.\d+\.\d+$'
      responses:
        '200':
          description: Firmware binary.
        '404':
          description: Firmware artifact not found.
  /api/v1/readers/scan:
    post:
      operationId: post_api_scan_scan
      responses:
        default:
          description: ''
  /api/v1/readers/next:
    post:
      operationId: post_api_scan_next
      responses:
        default:
          description: ''
  /api/v1/readers/previous:
    post:
      operationId: post_api_scan_previous
      responses:
        default:
          description: ''
  /api/v1/readers/scan-events:
    get:
      operationId: get_api_scan_scan_events
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/setup':
    get:
      operationId: get_api_setup_state
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/setup/step':
    put:
      operationId: put_api_setup_step_submit
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    post:
      operationId: post_api_setup_step_submit
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/setup/current-step':
    put:
