openapi: 3.0.0
info:
  title: 'SpotFamServ API'
  description: 'Spotify Familien Server – Backend API (Vertrag, geprüft via oasdiff)'
  version: 1.0.0
servers:
  -
    url: /api/v1
    description: 'API v1'
paths:
  /api/v1/activity-log:
    get:
      operationId: get_api_activity_log_list
      responses:
        default:
          description: ''
  /api/v1/devices:
    get:
      operationId: get_api_devices_list
      responses:
        default:
          description: ''
  '/api/v1/devices/{id}':
    get:
      operationId: get_api_devices_get
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  '/api/v1/devices/{id}/assign':
    put:
      operationId: put_api_devices_assign
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: ''
  /api/v1/devices/discover:
    post:
      operationId: post_api_devices_discover
      responses:
        default:
          description: ''
  /api/v1/devices/discovery-runs/latest:
    get:
      operationId: get_api_devices_discovery_latest
      responses:
        default:
          description: ''
  /api/v1/devices/discovery-runs:
    get:
      operationId: get_api_devices_discovery_runs
      responses:
        default:
          description: ''
  /api/v1/profiles:
    get:
      operationId: get_api_profiles_list
      responses:
        default:
          description: ''
    post:
      operationId: post_api_profiles_create
      responses:
        default:
          description: ''
  '/api/v1/profiles/{id}':
    get:
      operationId: get_api_profiles_get
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_profiles_update
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_profiles_delete
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{id}/default-device':
    put:
      operationId: put_api_profiles_set_default_device
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
      operationId: delete_api_profiles_clear_default_device
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards':
    get:
      operationId: get_api_rfid_list
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        '200':
          description: 'List of RFID cards for the profile'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, card_uid, label, binding]
                      properties:
                        id:
                          type: string
                          format: uuid
                        card_uid:
                          type: string
                        label:
                          type: string
                          nullable: true
                        binding:
                          nullable: true
                          oneOf:
                            - type: 'null'
                            - type: object
                              required: [id, name]
                              properties:
                                id:
                                  type: string
                                  format: uuid
                                name:
                                  type: string
    post:
      operationId: post_api_rfid_create
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards/{cardId}':
    get:
      operationId: get_api_rfid_get
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_rfid_update
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    delete:
