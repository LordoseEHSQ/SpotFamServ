            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  '/api/v1/profiles/{profileId}/rfid-cards/{cardId}/binding':
    get:
      operationId: get_api_rfid_get_binding
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
    put:
      operationId: put_api_rfid_set_binding
      parameters:
        -
          name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
        -
          name: cardId
          in: path
          required: true
          schema:
            type: string
            pattern: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      responses:
        default:
          description: ''
  /api/v1/rfid-cards/lookup:
