parameters:
    uuid_regex: '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
    reader_api_key: ''
    # Default leer = im Dev offen (analog reader_api_key). In Produktion FLASH_AGENT_API_KEY setzen.
    flash_agent_api_key: ''
    # Firmware-Verzeichnis für das Provisioning-Modul. Kann per FIRMWARE_DIR überschrieben werden.
    provisioning.firmware_dir: '%kernel.project_dir%/var/firmware'
    # Admin-Auth: Fallback-Parameter für Env ADMIN_USERNAME / ADMIN_PASSWORD (leer = kein Default)
    admin_username: ''
    admin_password: ''
    # Cookie-Namen (Session + CSRF Double-Submit). Zentral, damit framework.yaml und CSRF-Subscriber synchron bleiben.
    app.session_cookie_name: 'SPOTFAM_SESSID'
    app.csrf_cookie_name: 'XSRF-TOKEN'
    app.csrf_header_name: 'X-XSRF-TOKEN'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Module/*/Domain/*'

    # Explicit module application services can be tagged or wired by interface
    App\Module\FamilyProfile\Application\:
        resource: '../src/Module/FamilyProfile/Application/'
    App\Module\Spotify\Application\:
        resource: '../src/Module/Spotify/Application/'
    App\Module\Rfid\Application\:
        resource: '../src/Module/Rfid/Application/'
    App\Module\Scan\Application\:
        resource: '../src/Module/Scan/Application/'
    App\Module\SetupWizard\Application\:
        resource: '../src/Module/SetupWizard/Application/'

    # Repository-Interfaces (Application/Port/) → Doctrine-Implementierungen
    App\Module\FamilyProfile\Application\Port\FamilyProfileRepositoryInterface: '@App\Module\FamilyProfile\Infrastructure\Repository\DoctrineFamilyProfileRepository'
    App\Module\Rfid\Application\Port\RfidCardRepositoryInterface: '@App\Module\Rfid\Infrastructure\Repository\DoctrineRfidCardRepository'
    App\Module\Rfid\Application\Port\CardPlaylistBindingRepositoryInterface: '@App\Module\Rfid\Infrastructure\Repository\DoctrineCardPlaylistBindingRepository'
    App\Module\Spotify\Application\Port\SpotifyAccountLinkRepositoryInterface: '@App\Module\Spotify\Infrastructure\Repository\DoctrineSpotifyAccountLinkRepository'
    App\Module\Spotify\Application\Port\SpotifyPlaylistReferenceRepositoryInterface: '@App\Module\Spotify\Infrastructure\Repository\DoctrineSpotifyPlaylistReferenceRepository'
    App\Module\SetupWizard\Application\Port\ProfileSetupSessionRepositoryInterface: '@App\Module\SetupWizard\Infrastructure\Repository\DoctrineProfileSetupSessionRepository'
    App\Module\Scan\Application\Port\ReaderDeviceRepositoryInterface: '@App\Module\Scan\Infrastructure\Repository\DoctrineReaderDeviceRepository'
    App\Module\Scan\Application\Port\ReaderClaimRepositoryInterface: '@App\Module\Scan\Infrastructure\Repository\DoctrineReaderClaimRepository'
    App\Module\Scan\Application\Port\ScanEventRepositoryInterface: '@App\Module\Scan\Infrastructure\Repository\DoctrineScanEventRepository'
    App\Module\Scan\Application\Port\ScanCardResolverInterface: '@App\Module\Rfid\Infrastructure\Scan\RfidScanCardResolver'
    App\Module\Scan\Application\Port\PlaybackSessionStoreInterface: '@App\Module\Scan\Infrastructure\Session\CachePlaybackSessionStore'
    App\Shared\Application\Port\TransactionRunnerInterface: '@App\Shared\Infrastructure\Doctrine\DoctrineTransactionRunner'
    App\Module\Scan\Infrastructure\Session\CachePlaybackSessionStore:
        arguments:
            $cache: '@cache.app'
    App\Module\Device\Application\Port\SpotifyDeviceRepositoryInterface: '@App\Module\Device\Infrastructure\Repository\DoctrineSpotifyDeviceRepository'
    App\Module\Device\Application\Port\DeviceDiscoveryRunRepositoryInterface: '@App\Module\Device\Infrastructure\Repository\DoctrineDeviceDiscoveryRunRepository'
    App\Module\ActivityLog\Application\Port\ActivityLogRepositoryInterface: '@App\Module\ActivityLog\Infrastructure\Repository\DoctrineActivityLogRepository'

    App\Module\Device\Application\:
        resource: '../src/Module/Device/Application/'
    App\Module\ActivityLog\Application\:
        resource: '../src/Module/ActivityLog/Application/'
    App\Module\AudioExtractor\Application\:
        resource: '../src/Module/AudioExtractor/Application/'

    # Audio-Extractor: Subprozess-Adapter (yt-dlp/ffmpeg) erfüllt Extraktor- und Engine-Port.
    App\Module\AudioExtractor\Application\Port\MediaExtractorInterface: '@App\Module\AudioExtractor\Infrastructure\Process\YtDlpFfmpegExtractor'
    App\Module\AudioExtractor\Application\Port\MediaEngineInterface: '@App\Module\AudioExtractor\Infrastructure\Process\YtDlpFfmpegExtractor'
    App\Module\AudioExtractor\Infrastructure\Process\YtDlpFfmpegExtractor:
        arguments:
            $ytDlpBinary: '%audio_extractor.ytdlp_binary%'
            $timeoutSeconds: '%audio_extractor.timeout_seconds%'
            $maxDurationSeconds: '%audio_extractor.max_duration_seconds%'
    # Persistenter Speicher (gemeinsamer Host-Bereich, Dateisystem-Scan, kein Schema).
    App\Module\AudioExtractor\Application\Port\AudioStorageInterface: '@App\Module\AudioExtractor\Infrastructure\Storage\FilesystemAudioStorage'
    App\Module\AudioExtractor\Infrastructure\Storage\FilesystemAudioStorage:
        arguments:
            $storageDir: '%audio_extractor.storage_dir%'
    # Extraktion + Engine-Update teilen denselben Lock (Concurrency=1 + yt-dlp-U-Race, D-033)
    # und das harte Storage-Quota (D-034). LockFactory wird via framework.lock autowired.
    App\Module\AudioExtractor\Application\ExtractAudio:
        arguments:
            $maxTotalBytes: '%audio_extractor.max_total_bytes%'
            $lockTtlSeconds: '%audio_extractor.lock_ttl_seconds%'
    App\Module\AudioExtractor\Application\UpdateEngine:
        arguments:
            $lockTtlSeconds: '%audio_extractor.lock_ttl_seconds%'
    App\Module\AudioExtractor\Infrastructure\Http\AudioExtractorController:
        arguments:
            $maxDurationSeconds: '%audio_extractor.max_duration_seconds%'
            $timeoutSeconds: '%audio_extractor.timeout_seconds%'

    # SetupWizard: Strategy-Handler mit DI-Tagging
    App\Module\SetupWizard\Application\StepHandler\ProfileStepHandler:
        tags: [{ name: setup_wizard.step_handler }]
    App\Module\SetupWizard\Application\StepHandler\SpotifyValidateStepHandler:
        tags: [{ name: setup_wizard.step_handler }]
    App\Module\SetupWizard\Application\StepHandler\DefaultSpeakerStepHandler:
        tags: [{ name: setup_wizard.step_handler }]
    App\Module\SetupWizard\Application\StepHandler\PlaybackTestStepHandler:
        tags: [{ name: setup_wizard.step_handler }]
    App\Module\SetupWizard\Application\StepHandler\PassthroughStepHandler:
        tags: [{ name: setup_wizard.step_handler }]

    App\Module\SetupWizard\Application\SubmitStep:
        arguments:
            $handlers: !tagged_iterator setup_wizard.step_handler

    App\Module\Scan\Infrastructure\Http\ScanController:
        arguments:
            $readerApiKey: '%env(default:reader_api_key:READER_API_KEY)%'

    # ── Provisioning-Modul ────────────────────────────────────────────────────
    App\Module\Provisioning\Application\:
        resource: '../src/Module/Provisioning/Application/'

    # Ports → Doctrine-Implementierungen
    App\Module\Provisioning\Application\Port\DetectedDeviceRepositoryInterface: '@App\Module\Provisioning\Infrastructure\Repository\DoctrineDetectedDeviceRepository'
    App\Module\Provisioning\Application\Port\FlashArtifactRepositoryInterface: '@App\Module\Provisioning\Infrastructure\Repository\DoctrineFlashArtifactRepository'
    App\Module\Provisioning\Application\Port\FlashJobRepositoryInterface: '@App\Module\Provisioning\Infrastructure\Repository\DoctrineFlashJobRepository'

    # Agent-Controller: FLASH_AGENT_API_KEY (leer = Dev-offen, analog READER_API_KEY-Muster).
    # readerApiKey wird an den Reader-Config-Endpoint (C1) für die NVS-Injektion durchgereicht.
    App\Module\Provisioning\Infrastructure\Http\ProvisioningAgentController:
        arguments:
            $flashAgentApiKey: '%env(default:flash_agent_api_key:FLASH_AGENT_API_KEY)%'
            $readerApiKey: '%env(default:reader_api_key:READER_API_KEY)%'

    # Console-Command: FIRMWARE_DIR (Default: %kernel.project_dir%/var/firmware)
    App\Module\Provisioning\Infrastructure\Console\RegisterArtifactCommand:
        arguments:
            $firmwareDir: '%env(default:provisioning.firmware_dir:FIRMWARE_DIR)%'

    # Admin-Upload-Endpunkt: FIRMWARE_DIR (gleicher Wert wie Command)
    App\Module\Provisioning\Infrastructure\Http\ProvisioningAdminController:
        arguments:
            $firmwareDir: '%env(default:provisioning.firmware_dir:FIRMWARE_DIR)%'
    # ─────────────────────────────────────────────────────────────────────────

    # ── Admin-Auth-Modul ──────────────────────────────────────────────────────
    App\Module\Admin\Application\Port\AdminUserRepositoryInterface: '@App\Module\Admin\Infrastructure\Repository\DoctrineAdminUserRepository'

    App\Module\Admin\Infrastructure\Console\UpsertAdminCommand:
        arguments:
            $defaultUsername: '%env(default:admin_username:ADMIN_USERNAME)%'
            $defaultPassword: '%env(default:admin_password:ADMIN_PASSWORD)%'

    App\Module\Admin\Infrastructure\Security\CsrfSubscriber:
        arguments:
            $sessionCookieName: '%app.session_cookie_name%'
            $csrfCookieName: '%app.csrf_cookie_name%'
            $csrfHeaderName: '%app.csrf_header_name%'

    App\Module\Admin\Infrastructure\Http\AuthController:
        arguments:
            $csrfCookieName: '%app.csrf_cookie_name%'
    # ─────────────────────────────────────────────────────────────────────────

    # ── System-Modul (systemweite Betriebs-Konfiguration, D-029) ──────────────
    App\Module\System\Application\:
        resource: '../src/Module/System/Application/'

    App\Module\System\Application\Port\SystemConfigurationRepositoryInterface: '@App\Module\System\Infrastructure\Repository\DoctrineSystemConfigurationRepository'
    App\Module\System\Application\Port\SystemConfigurationProviderInterface: '@App\Module\System\Infrastructure\SystemConfigurationProvider'

    # Provider + Get-UseCase beziehen den Frontend-URL-Env-Fallback (DB gewinnt pro Feld).
    App\Module\System\Infrastructure\SystemConfigurationProvider:
        arguments:
            $envFrontendUrl: '%spotify.frontend_url%'
    App\Module\System\Application\GetSystemConfiguration:
        arguments:
            $envFrontendUrl: '%spotify.frontend_url%'
    # ─────────────────────────────────────────────────────────────────────────

    App\Module\Spotify\Application\Port\TokenEncryptionInterface: '@App\Module\Spotify\Infrastructure\Security\TokenEncryptionService'
    App\Module\Spotify\Infrastructure\Security\TokenEncryptionService:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
    App\Module\Spotify\Infrastructure\Doctrine\EncryptedStringTypeInitializer:
        tags: [kernel.event_subscriber]

    App\Module\Spotify\Application\Port\SpotifyApiClientInterface: '@App\Module\Spotify\Infrastructure\Spotify\SpotifyHttpApiClient'
    App\Module\Spotify\Application\Port\SpotifyTokenManagerInterface: '@App\Module\Spotify\Infrastructure\Spotify\SpotifyTokenManager'
    App\Module\Spotify\Application\Port\OAuthStateManagerInterface: '@App\Module\Spotify\Infrastructure\Spotify\SpotifyOAuthStateManager'
    App\Module\Spotify\Application\Port\SpotifyAppConfigRepositoryInterface: '@App\Module\Spotify\Infrastructure\Repository\DoctrineSpotifyAppConfigRepository'

    # Effektive Credentials: DB-Config (Source of Truth) vor env-Fallback.
    App\Module\Spotify\Application\Port\SpotifyCredentialsProviderInterface: '@App\Module\Spotify\Infrastructure\Spotify\SpotifyCredentialsProvider'
    App\Module\Spotify\Infrastructure\Spotify\SpotifyCredentialsProvider:
        arguments:
            $envClientId: '%spotify.client_id%'
            $envClientSecret: '%spotify.client_secret%'
            $envRedirectUri: '%spotify.redirect_uri%'

    App\Module\Spotify\Infrastructure\Spotify\SpotifyOAuthStateManager:
        arguments:
            $cache: '@cache.app'

    # SpotifyHttpApiClient, GetSpotifyAuthorizationUrl und SpotifyOAuthController beziehen
    # Client ID/Secret/Redirect zur Laufzeit über den SpotifyCredentialsProvider (autowired).

    App\Module\Spotify\Application\GetSpotifyAppConfig:
        arguments:
            $envClientId: '%spotify.client_id%'
            $envClientSecret: '%spotify.client_secret%'
            $envRedirectUri: '%spotify.redirect_uri%'

    # SpotifyOAuthController bezieht die Frontend-URL über den SystemConfigurationProvider (autowired).
