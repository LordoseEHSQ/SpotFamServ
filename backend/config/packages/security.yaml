security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Module\Admin\Domain\AdminUser: 'auto'
    providers:
        app_admin_provider:
            entity:
                class: App\Module\Admin\Domain\AdminUser
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api/v1
            stateless: true
            # lazy: true
            # json_login or custom authenticator – enable when Auth module is implemented
            # provider: app_admin_provider
    access_control:
        - { path: ^/api/v1, roles: PUBLIC_ACCESS }
        # - { path: ^/api/v1, roles: ROLE_ADMIN }  # enable when auth is on
