# Spotify Familien Server – MVP
# Local development on WSL2; multi-arch for Raspberry Pi later

services:
  app:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - DATABASE_URL=postgresql://spotfam:spotfam@db:5432/spotfam
      - APP_ENV=dev
      - APP_SECRET=${APP_SECRET:-change-me-in-env}
      # SPOTIFY_CLIENT_ID/SECRET kommen aus backend/.env.local (git-ignoriert), nicht aus der Container-Env.
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:8080/api/v1/spotify/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - READER_API_KEY=${READER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spotfam

  nginx:
    restart: unless-stopped
    # Web-Image (SPA + default.conf) wird in CI gebaut und aus GHCR gezogen (D-012/D-013).
    # WEB_IMAGE_TAG injiziert pi-deploy.sh (= deployter v*-Tag); Fallback latest fuer manuelle Laeufe.
    # Lokaler Frontend-Dev laeuft ueber `pnpm dev` (Vite-Proxy -> :8080), nicht ueber dieses Image.
    image: ghcr.io/lordoseehsq/spotfamserv-web:${WEB_IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    volumes:
      # default.conf bleibt gemountet (O-4 bake_keep): git-getrieben, folgt dem Tag, lokal editierbar.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # backend/public bleibt: nginx braucht es fuer $realpath_root im fastcgi-Proxy.
      - ./backend/public:/var/www/html/public:ro
      # frontend/dist ENTFERNT -> kommt aus dem Image.
    depends_on:
      - app
    networks:
      - spotfam

  db:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: spotfam
      POSTGRES_PASSWORD: spotfam
      POSTGRES_DB: spotfam
    volumes:
      - spotfam_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotfam -d spotfam"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spotfam

volumes:
  spotfam_db_data:

networks:
  spotfam:
    driver: bridge
