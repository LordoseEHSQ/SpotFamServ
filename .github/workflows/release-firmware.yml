name: Release Firmware

# Baut spotfam_reader bei v*-Tags und veröffentlicht die .bin als GitHub-Release-Asset.
# Getrennt von ci.yml – Required-Checks auf PRs bleiben unberührt.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware-release:
    name: Build & Release ESP32 Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8
          arduino-cli lib install ArduinoJson@7.4.3
          arduino-cli lib install "Adafruit PN532"@1.3.4
          arduino-cli lib install "Adafruit BusIO"@1.17.4

      - name: Provide CI firmware secrets
        working-directory: firmware/spotfam_reader
        run: cp secrets.h.example secrets.h

      - name: Compile SpotFam reader firmware
        working-directory: firmware/spotfam_reader
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32:PartitionScheme=no_fs . --output-dir /tmp/fw
          ls -la /tmp/fw

      - name: Prepare release asset
        run: |
          BIN="$(find /tmp/fw -name '*.merged.bin' -o -name '*.ino.bin' | head -1)"
          if [ -z "$BIN" ]; then
            echo "FEHLER: Keine .bin nach Compile gefunden"
            find /tmp/fw -type f
            exit 1
          fi
          cp "$BIN" /tmp/spotfam_reader.ino.merged.bin
          echo "FIRMWARE_BIN=/tmp/spotfam_reader.ino.merged.bin" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "SpotFamServ ${{ github.ref_name }}" \
            --notes "Firmware-Artefakt für ESP32-WROOM-32 (OTA PartitionScheme=no_fs). Siehe CHANGELOG.md." \
            "$FIRMWARE_BIN"
